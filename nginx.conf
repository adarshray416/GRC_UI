# ============================================================
# BABCOM GRC — Nginx Configuration
# Serves the frontend HTML and proxies all API + WebSocket
# requests to the FastAPI backend container.
#
# HTTP only (port 80).
# To add HTTPS: see the commented HTTPS block at the bottom.
# ============================================================

server {
    listen 80;
    server_name _;          # accepts any hostname

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection      "1; mode=block" always;

    # ── Frontend static files ───────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend REST API proxy ──────────────────────────────────────────────
    # All /api/* requests go to the FastAPI container.
    # This means the frontend JS can use a plain /api/health path
    # (no hardcoded localhost:8000 needed when deployed).
    location /api/ {
        proxy_pass         http://grc-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow larger file uploads (evidence PDFs can be big)
        client_max_body_size 50M;

        # Increase timeout for long-running assessments
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # ── WebSocket proxy ─────────────────────────────────────────────────────
    # Live log streaming via ws://yourserver/ws/logs
    location /ws/ {
        proxy_pass         http://grc-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;     # keep WS alive for up to 1 hour
    }

    # ── FastAPI docs (optional — remove in production) ──────────────────────
    location /docs {
        proxy_pass http://grc-backend:8000/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://grc-backend:8000/openapi.json;
    }
}

