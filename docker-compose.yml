version: "3.9"

# ============================================================
# BABCOM GRC Platform — Docker Compose
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Logs:    docker compose logs -f grc-backend
# Rebuild: docker compose up -d --build
# ============================================================

services:

  # ── GRC Backend (FastAPI) ─────────────────────────────────────────────────
  grc-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grc-backend
    restart: unless-stopped
    environment:
      # GitHub token for scraping your repo (create at github.com/settings/tokens)
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}

      # Okta (optional — leave blank to disable)
      OKTA_DOMAIN:    ${OKTA_DOMAIN:-}
      OKTA_API_TOKEN: ${OKTA_API_TOKEN:-}

      # LLM extraction fallback (optional — leave blank to disable)
      ANTHROPIC_API_KEY:   ${ANTHROPIC_API_KEY:-}
      ENABLE_LLM_EXTRACTION: ${ENABLE_LLM_EXTRACTION:-false}

      # Alert settings
      GRC_ALERT_TO:   ${GRC_ALERT_TO:-}
      GRC_ALERT_FROM: ${GRC_ALERT_FROM:-grc@babcom.local}
      SMTP_HOST:      ${SMTP_HOST:-localhost}

    volumes:
      # Persist evidence index and uploaded files across restarts
      - grc-data:/app/uploads
      - ./evidence:/app/evidence:ro

    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx reverse proxy + static file server ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: grc-nginx
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP
      - "443:443"    # HTTPS (needs certs — see nginx/nginx.conf)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      # Uncomment for HTTPS:
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      grc-backend:
        condition: service_healthy

volumes:
  grc-data:
